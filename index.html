<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Tic-Tac-Toe">
      <header class="header">
        <div>
          <h1 class="title">Tic‑Tac‑Toe</h1>
          <p id="subtitle" class="subtitle">You vs CPU (easy)</p>
        </div>
        <div class="controls">
          <button id="newGameBtn" class="btn" type="button">New game</button>
          <button id="toggleStarterBtn" class="btn btnSecondary" type="button">You start: X</button>
        </div>
      </header>

      <section class="panel" aria-label="Game status">
        <div id="status" class="status" role="status" aria-live="polite">Your turn.</div>
      </section>

      <section class="boardWrap" aria-label="Board">
        <div id="board" class="board" role="grid" aria-label="Tic-tac-toe board"></div>
      </section>

      <footer class="footer">
        <p class="hint">Tip: Try to win—CPU picks random moves.</p>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
